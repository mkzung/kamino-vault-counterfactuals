name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (py${{ matrix.python }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: python -m ruff check src/ tests/

      - name: Type check with mypy
        run: python -m mypy src/kvcf

      - name: Run tests with coverage
        run: python -m pytest tests/ --cov=src/kvcf --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  smoke-cli:
    name: CLI smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: kvcf demo (markdown)
        run: kvcf demo | head -20
      - name: kvcf demo (JSON)
        run: kvcf demo --json | python -m json.tool > /dev/null
      - name: kvcf demo (HTML)
        run: |
          kvcf demo --html /tmp/report.html
          test -s /tmp/report.html
          grep -q "DOCTYPE html" /tmp/report.html
